name: ci
# Same shape as Yolean/envoyimage's echo.yaml: separate verify and
# publish phases, image push gated on the full e2e suite passing
# first. (No upstream-image cron job — there's nothing for this repo
# to mirror in the registry sense.)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  SOURCE_DATE_EPOCH: '0'

jobs:
  test:
    name: unit + lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: install build deps for librdkafka
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake g++ make pkg-config
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - uses: Swatinem/rust-cache@v2
    - run: cargo fmt --all -- --check
    - run: cargo clippy --workspace --all-targets --locked -- -Dwarnings
    - name: unit + integration tests (no docker)
      run: cargo test --workspace --exclude mirror-e2e --locked
    - name: schema gate
      run: cargo run -p xtask --locked -- check-schema

  e2e:
    name: e2e (docker)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: install build deps for librdkafka
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends cmake g++ make pkg-config
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: prepull e2e images
      run: |
        docker pull quay.io/ogunalp/kafka-native:latest &
        docker pull docker.io/redpandadata/redpanda:latest &
        docker pull docker.io/versity/versitygw:latest &
        wait
    - name: cargo test mirror-e2e
      run: cargo test -p mirror-e2e --locked -- --test-threads=1

  image:
    name: build + push image
    needs: [test, e2e]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v3
    - name: login to ghcr.io
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/yolean/mirror-v3
        # Tag rules:
        #   - push to main          -> :main and :latest and :sha-<short-sha>
        #   - push to tag vX.Y.Z    -> :vX.Y.Z (and :latest if default-branch)
        #   - PR / workflow_dispatch -> :pr-<n> or :sha-<short-sha> (build-only, no push)
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=ref,event=branch
          type=ref,event=tag
          type=ref,event=pr
          type=sha,prefix=sha-
    - name: build (and push on non-PR)
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        provenance: false
