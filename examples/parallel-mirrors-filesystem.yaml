# yaml-language-server: $schema=../schemas/mirror-v3.config.schema.json
#
# Two mirrors of distinct partitions, archived to the local
# filesystem with per-mirror flush triggers.
#
# !! Deployment requirement !!
# "Parallel" here means N mirrors run inside a SINGLE process. The
# deployment must still be single-replica — two pods writing to the
# same destination directory would race on filename renames and
# trip the scan-validate on the next restart. Deploy with:
#   spec.replicas: 1
#   spec.strategy.type: Recreate

destination:
  type: filesystem
  root: /var/lib/mirror-v3
  # format defaults to `parquet`; uncomment for the ndjson debug format
  # format: ndjson
  # compression defaults to `zstd-1`. Other options: zstd-3, snappy, lz4, uncompressed.
  # compression: zstd-1
  flush:
    max-time-ms: 5000          # at most 5s of buffering
    max-bytes: 67108864        # or 64 MiB — parquet files want some heft to amortize the footer
    max-offsets: 10000         # or 10k source offsets

mirrors:
  - name: operations-p0
    source:
      bootstrap-servers: kafka-source:9092
    topic: operations-v1
    partition: 0
  - name: operations-p1
    source:
      bootstrap-servers: kafka-source:9092
    topic: operations-v1
    partition: 1
